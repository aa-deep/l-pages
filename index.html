<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端专属优化：禁用缩放、适配屏幕 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>浪漫情感选择</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; background-color: #FFC0CB;
            padding: 20px; overflow: hidden; position: relative;
        }
        .cartoon-img {
            width: 220px; height: 220px; margin-bottom: 20px;
            object-fit: contain; z-index: 10;
        }
        .question-text { font-size: 24px; color: #333; margin-bottom: 30px; z-index: 10; text-align: center; }
        .btn-group { display: flex; gap: 30px; z-index: 10; flex-wrap: wrap; justify-content: center; }
        .choice-btn {
            padding: 18px 40px; /* 增大手机点击区域 */
            min-height: 50px;
            font-size: 20px;    /* 增大字体 */
            border: none;
            border-radius: 8px; cursor: pointer; transition: all 0.3s ease;
            touch-action: manipulation; /* 禁用移动端触摸缩放 */
        }
        .agree-btn { background-color: #e63946; color: white; --scale: 1; transform: scale(var(--scale)); }
        .disagree-btn { background-color: #457b9d; color: white; }

        .floating-icon {
            position: absolute; pointer-events: none;
            animation: fall 6s linear forwards; z-index: 1;
            text-shadow: 0 0 6px rgba(255, 255, 255, 0.9);
        }
        @keyframes fall {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            100% { 
                transform: translate(calc(var(--random-x) * 200px), 120vh) rotate(720deg);
                opacity: 0; 
            }
        }
        audio { display: none; }
    </style>
</head>
<body>
    <!-- 音频：优先MP3（移动端兼容），备选OGG，添加预加载 -->
    <audio id="bgMusic" loop preload="auto">
        <source src="meet.mp3" type="audio/mpeg">
        <source src="meet.ogg" type="audio/ogg">
    </audio>

    <!-- 图片使用相对路径（适配GitHub Pages） -->
    <img src="happy.jpg" alt="卡通形象" class="cartoon-img" id="cartoonImg">
    
    <div class="question-text">可以成为我的恋人吗？</div>
    
    <div class="btn-group">
        <button class="choice-btn agree-btn" id="agreeBtn">可以</button>
        <button class="choice-btn disagree-btn" id="disagreeBtn">不要</button>
    </div>

    <script>
        const cartoonImg = document.getElementById('cartoonImg');
        const agreeBtn = document.getElementById('agreeBtn');
        const disagreeBtn = document.getElementById('disagreeBtn');
        const bgMusic = document.getElementById('bgMusic');
        let isMusicPlayed = false;

        // 图片路径：纯相对路径（和GitHub仓库文件名一致）
        const imgSrc = {
            happy: "happy.jpg",
            sad: "sad.jpg"
        };
        let scaleNum = 1;

        // 点击"不要"：添加时间戳刷新缓存，确保图片切换
        disagreeBtn.addEventListener('click', () => {
            scaleNum += 0.15;
            agreeBtn.style.setProperty('--scale', scaleNum);
            // 时间戳强制刷新，避免手机缓存
            cartoonImg.src = imgSrc.sad + '?t=' + new Date().getTime();
        });

        // 点击"可以"：适配移动端触摸事件，强制触发音乐播放
        agreeBtn.addEventListener('click', async () => {
            clearIcons();
            
            // 移动端强制触发音乐播放（兼容触摸事件）
            try {
                await bgMusic.play();
                isMusicPlayed = true;
            } catch (err) {
                alert('请点击"确定"后，再点一下页面任意位置开启音乐～');
                // 监听一次点击/触摸事件
                document.addEventListener('click', function playMusicOnce() {
                    bgMusic.play();
                    isMusicPlayed = true;
                    document.removeEventListener('click', playMusicOnce);
                }, { once: true });
            }

            // 满屏飘动画
            for (let i = 0; i < 100; i++) {
                setTimeout(() => createFloatingIcon(), i * 50);
            }
            
            // 恢复开心图片，同样加时间戳
            cartoonImg.src = imgSrc.happy + '?t=' + new Date().getTime();
            scaleNum = 1;
            agreeBtn.style.setProperty('--scale', scaleNum);
        });

        // 生成浮动图标（逻辑不变）
        function createFloatingIcon() {
            const icon = document.createElement('div');
            icon.className = 'floating-icon';
            const icons = ['❤️', '⭐', '💖', '✨', '🌹', '💘'];
            icon.innerText = icons[Math.floor(Math.random() * icons.length)];
            
            const startX = Math.random() * window.innerWidth;
            const randomX = (Math.random() - 0.5) * 4; 
            
            icon.style.left = `${startX}px`;
            icon.style.top = `${Math.random() * -100 - 50}px`;
            icon.style.setProperty('--random-x', randomX);
            icon.style.fontSize = `${Math.random() * 20 + 12}px`;
            icon.style.opacity = `${Math.random() * 0.7 + 0.3}`;
            
            if (['❤️', '💖', '🌹', '💘'].includes(icon.innerText)) {
                icon.style.color = `rgb(255, ${Math.floor(Math.random() * 100)}, ${Math.floor(Math.random() * 150)})`;
            } else {
                icon.style.color = `rgb(255, 255, ${Math.floor(Math.random() * 100)})`;
            }
            
            document.body.appendChild(icon);
            setTimeout(() => icon.remove(), 6000);
        }

        function clearIcons() {
            document.querySelectorAll('.floating-icon').forEach(icon => icon.remove());
        }
    </script>
</body>
</html>
